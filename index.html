<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1A4329">
  <title>Valley Coffee & More — Carte Digitale</title>

  <!-- Tailwind CSS Play CDN (v3.4.1) for zero Setup, zero builds, instant client side compiling -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Configure custom theme options for the Tailwind compiler on the fly -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            valley: {
              green: '#12281B', // Dark emerald
              greenLight: '#1A4329', // Leaf gold green
              gold: '#C29B53', // Warm high legibility gold
              cream: '#E2D9C3', // Warm cream light color (slightly darker for superb cozy feel)
              darkbg: '#0a120d', // Deeper carbon forest-black for categories overview page
              productspagebg: '#0c1a12', // Darker forest page backplane for products list
              categorycardbg: '#ffffff', // Clean white card background for plano light category cards
              categorycardborder: '#E8DFCC', // Soft elegant golden-sand border for categories
              productcardbg: '#14251c', // Crisp dark jade-ceramic container for products
              productcardborder: '#1f3829', // Perfect contrast leaf border for products
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'Georgia', 'serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>

  <!-- Load Valley custom style file -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen text-gray-100 bg-valley-darkbg flex flex-col pb-24 scrollbar-none selection:bg-valley-gold/20 selection:text-valley-gold transition-colors duration-500">

  <!-- Main Root App Mount -->
  <div id="root" class="w-full max-w-xl mx-auto flex flex-col min-h-screen relative">
    
    <!-- Skeleton loader display before scripts boot -->
    <div id="init-loader" class="flex-1 flex flex-col items-center justify-center p-8 space-y-4">
      <div class="w-12 h-12 rounded-full border-4 border-valley-green/20 border-t-valley-gold animate-spin"></div>
      <div class="text-center">
        <h3 class="font-serif text-xl font-bold text-valley-gold">Valley Coffee</h3>
        <p class="text-xs text-gray-450 mt-1">Génération du menu numérique...</p>
      </div>
    </div>

  </div>

  <!-- Load JS Datastores and Core App Logic cleanly in sequential script tags -->
  <script src="menuData.js"></script>
  <script src="app.js"></script>

</body>
</html>
